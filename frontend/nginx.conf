server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location /api/ {
        proxy_pass http://ficc-backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type,Authorization";
        if ($request_method = OPTIONS) { return 204; }
    }

    location /og/ {
        proxy_pass http://ficc-backend:5000/og/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /uploads/ {
        proxy_pass http://ficc-backend:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Redirect social media bots to OG endpoints
    set $is_bot 0;
    if ($http_user_agent ~* "WhatsApp|facebookexternalhit|Twitterbot|TelegramBot|LinkedInBot|Slackbot|Discordbot") {
        set $is_bot 1;
    }

    location = /chambers {
        if ($is_bot) { return 301 /og/chambers; }
        try_files $uri /index.html;
    }
    location ~ ^/chambers/([0-9]+)$ {
        if ($is_bot) { return 301 /og/chambers/$1; }
        try_files $uri /index.html;
    }
    location = /news {
        if ($is_bot) { return 301 /og/news; }
        try_files $uri /index.html;
    }
    location ~ ^/news/([0-9]+)$ {
        if ($is_bot) { return 301 /og/news/$1; }
        try_files $uri /index.html;
    }
    location = /members {
        if ($is_bot) { return 301 /og/members; }
        try_files $uri /index.html;
    }
    location = /exhibitions {
        if ($is_bot) { return 301 /og/exhibitions; }
        try_files $uri /index.html;
    }
    location = /lawyers {
        if ($is_bot) { return 301 /og/lawyers; }
        try_files $uri /index.html;
    }
    location = /directory {
        if ($is_bot) { return 301 /og/directory; }
        try_files $uri /index.html;
    }
    location ~ ^/directory/([0-9]+)$ {
        if ($is_bot) { return 301 /og/traders/$1; }
        try_files $uri /index.html;
    }

    location = /chat {
        if ($is_bot) { return 301 /og/chat; }
        try_files $uri /index.html;
    }

    location = /subscribe {
        if ($is_bot) { return 301 /og/subscribe; }
        try_files $uri /index.html;
    }

    location = /shipping {
        if ($is_bot) { return 301 /og/shipping; }
        try_files $uri /index.html;
    }
    location ~ ^/shipping/([0-9]+)$ {
        if ($is_bot) { return 301 /og/shipping/$1; }
        try_files $uri /index.html;
    }
    location ~ ^/members/([0-9]+)$ {
        if ($is_bot) { return 301 /og/members/$1; }
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
