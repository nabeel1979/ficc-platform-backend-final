<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>Badges — FICC</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cairo', sans-serif; background: #e8ecf0; direction: rtl; }

/* شريط التحكم */
.toolbar {
  background: #1a2a5e;
  padding: 10px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
}
.toolbar h1 { color: #FFC72C; font-size: 14px; font-weight: 800; }
.toolbar .info { color: rgba(255,255,255,0.6); font-size: 11px; }
.btn { padding: 7px 16px; border: none; border-radius: 7px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 12px; }
.btn-print { background: #FFC72C; color: #1a2a5e; margin-right: auto; }
.btn-close  { background: rgba(255,255,255,0.12); color: #fff; }
.btn-mode   { background: rgba(255,255,255,0.12); color: #fff; }
.btn-mode.active { background: #FFC72C; color: #1a2a5e; }

/* ورقة A4 */
.a4-page {
  width: 210mm;
  height: 297mm;
  background: #fff;
  margin: 16px auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 0;
  page-break-after: always;
  overflow: hidden;
}

/* بطاقة A6 */
.card {
  width: 105mm;
  height: 148mm;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== FRONT ===== */
.card-front {
  background: linear-gradient(170deg, #1a2a5e 0%, #2C3E6B 50%, #3d5a9a 100%);
  color: #fff;
  align-items: center;
  justify-content: space-between;
  padding: 10mm 8mm;
  position: relative;
}
/* دوائر زخرفية */
.card-front::before {
  content: '';
  position: absolute;
  top: -20mm; right: -15mm;
  width: 60mm; height: 60mm;
  border-radius: 50%;
  background: rgba(255,199,44,0.08);
}
.card-front::after {
  content: '';
  position: absolute;
  bottom: -15mm; left: -10mm;
  width: 50mm; height: 50mm;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
}

.front-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4mm;
  z-index: 1;
}
.front-header img.logo {
  width: 18mm; height: 18mm;
  border-radius: 4mm;
  background: #fff;
  padding: 1.5mm;
  object-fit: contain;
}
.front-header .org-ar {
  color: #FFC72C;
  font-weight: 900;
  font-size: 9pt;
  text-align: center;
  line-height: 1.4;
}
.front-header .org-en {
  color: rgba(255,255,255,0.55);
  font-size: 6pt;
  text-align: center;
}

.front-photo-wrap {
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4mm;
}
.front-photo {
  width: 32mm; height: 32mm;
  border-radius: 50%;
  overflow: hidden;
  border: 3px solid #FFC72C;
  background: rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24pt;
}
.front-photo img { width: 100%; height: 100%; object-fit: cover; }

.front-name {
  font-size: 13pt;
  font-weight: 900;
  text-align: center;
  line-height: 1.3;
  color: #fff;
}
.front-code {
  font-size: 8pt;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #FFC72C;
  background: rgba(255,199,44,0.15);
  padding: 2mm 6mm;
  border-radius: 10mm;
  border: 1px solid rgba(255,199,44,0.3);
}

.front-qr {
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2mm;
}
.front-qr img {
  width: 22mm; height: 22mm;
  background: #fff;
  border-radius: 3mm;
  padding: 1.5mm;
  display: block;
}
.front-qr-label {
  font-size: 5.5pt;
  color: rgba(255,255,255,0.5);
}
.front-footer {
  display: flex;
  justify-content: space-between;
  width: 100%;
  z-index: 1;
  font-size: 5.5pt;
  color: rgba(255,255,255,0.4);
  border-top: 1px solid rgba(255,255,255,0.1);
  padding-top: 3mm;
}
.front-footer .member-badge {
  color: #FFC72C;
  font-weight: 700;
}

/* ===== BACK ===== */
.card-back {
  background: #fff;
  border: 0.5mm solid #e5e7eb;
  padding: 8mm;
  align-items: stretch;
  justify-content: flex-start;
  gap: 4mm;
}

.back-header {
  background: linear-gradient(135deg, #1a2a5e, #2C3E6B);
  border-radius: 4mm;
  padding: 5mm;
  display: flex;
  align-items: center;
  gap: 3mm;
}
.back-header img {
  width: 10mm; height: 10mm;
  border-radius: 2mm;
  background: #fff;
  padding: 1mm;
  object-fit: contain;
}
.back-header .org {
  color: #FFC72C;
  font-weight: 900;
  font-size: 7.5pt;
}
.back-header .org-en {
  color: rgba(255,255,255,0.5);
  font-size: 5pt;
}

.back-course-title {
  font-size: 12pt;
  font-weight: 900;
  color: #1a2a5e;
  line-height: 1.4;
  border-bottom: 1px solid #e5e7eb;
  padding-bottom: 3mm;
}

.back-details {
  display: flex;
  flex-direction: column;
  gap: 2mm;
  flex: 1;
}
.back-detail-row {
  display: flex;
  align-items: flex-start;
  gap: 2mm;
  font-size: 8.5pt;
  color: #374151;
  line-height: 1.5;
}
.back-detail-icon { flex-shrink: 0; font-size: 9pt; }

.back-welcome {
  background: linear-gradient(135deg, #FFC72C20, #FFC72C10);
  border: 1px solid #FFC72C50;
  border-radius: 3mm;
  padding: 4mm;
  text-align: center;
  font-size: 8pt;
  color: #92400e;
  line-height: 1.6;
}
.back-welcome strong { color: #1a2a5e; display: block; font-size: 9pt; margin-bottom: 1mm; }

.back-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid #e5e7eb;
  padding-top: 3mm;
  font-size: 6pt;
  color: #94a3b8;
}
.back-website { color: #4A6FA5; font-weight: 700; }

/* Separator بين البطاقات */
.a4-page .card { border: 0.25mm dashed #ddd; }

#status {
  text-align: center;
  padding: 60px;
  font-size: 16px;
  color: #666;
}

@media print {
  .toolbar { display: none !important; }
  body { background: white; }
  .a4-page {
    margin: 0 !important;
    page-break-after: always;
    box-shadow: none !important;
  }
  .card { border: none !important; }
}
@page { size: A4 portrait; margin: 0; }
</style>
</head>
<body>

<div class="toolbar">
  <h1 id="title">🪪 Badges — FICC</h1>
  <span class="info" id="count"></span>
  <button class="btn btn-mode active" id="modeBtn" onclick="toggleMode()">🔄 وجه + خلف</button>
  <button class="btn btn-print" onclick="window.print()">🖨️ طباعة / PDF</button>
  <button class="btn btn-close" onclick="window.close()">✕</button>
</div>

<div id="status">⏳ جارٍ التحميل...</div>
<div id="content"></div>

<script>
const params   = new URLSearchParams(window.location.search)
const courseId = params.get('course') || ''
const API      = '/api'
let showBoth   = true // وجه + خلف
let courseData = null
let appsData   = []

function toggleMode() {
  showBoth = !showBoth
  document.getElementById('modeBtn').textContent = showBoth ? '🔄 وجه + خلف' : '📋 وجه فقط'
  document.getElementById('modeBtn').classList.toggle('active', showBoth)
  render()
}

function fmt(d) {
  if (!d) return ''
  try { return new Date(d).toLocaleDateString('ar-IQ',{year:'numeric',month:'long',day:'numeric',timeZone:'Asia/Baghdad'}) } catch { return d }
}
function qr(url) { return 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=6&data=' + encodeURIComponent(url) }

function makeFront(app, course) {
  const sub    = app.subscriber || {}
  const name   = sub.fullName   || app.fullName  || app.FullName  || '—'
  const code   = sub.subscriberCode || sub.SubscriberCode || ''
  const photo  = sub.profileImage   || sub.ProfileImage  || ''
  const url    = 'https://ficc.iq/startups/' + courseId

  return `
  <div class="card card-front">
    <div class="front-header">
      <img class="logo" src="https://ficc.iq/ficc-logo.jpg" onerror="this.style.display='none'">
      <div class="org-ar">اتحاد الغرف التجارية العراقية</div>
      <div class="org-en">Federation of Iraqi Chambers of Commerce</div>
    </div>

    <div class="front-photo-wrap">
      <div class="front-photo">
        ${photo ? `<img src="${photo}" onerror="this.textContent='👤'">` : '👤'}
      </div>
      <div class="front-name">${name}</div>
      ${code ? `<div class="front-code">${code}</div>` : ''}
    </div>

    <div class="front-qr">
      <img src="${qr(url)}" alt="QR">
      <div class="front-qr-label">امسح لعرض الدورة</div>
    </div>

    <div class="front-footer">
      <span>ficc.iq</span>
      <span class="member-badge">✓ عضو مشارك</span>
      <span>${new Date().getFullYear()}</span>
    </div>
  </div>`
}

function makeBack(course) {
  const dates = course.startDate
    ? (course.endDate
      ? `${fmt(course.startDate)} — ${fmt(course.endDate)}`
      : fmt(course.startDate))
    : ''

  return `
  <div class="card card-back">
    <div class="back-header">
      <img src="https://ficc.iq/ficc-logo.jpg" onerror="this.style.display='none'">
      <div>
        <div class="org">اتحاد الغرف التجارية العراقية</div>
        <div class="org-en">Federation of Iraqi Chambers of Commerce</div>
      </div>
    </div>

    <div class="back-course-title">🎓 ${course.title || ''}</div>

    <div class="back-details">
      ${dates         ? `<div class="back-detail-row"><span class="back-detail-icon">📅</span><span>${dates}</span></div>` : ''}
      ${course.location ? `<div class="back-detail-row"><span class="back-detail-icon">📍</span><span>${course.location}</span></div>` : ''}
      ${course.speaker  ? `<div class="back-detail-row"><span class="back-detail-icon">👤</span><span>المتحدث: ${course.speaker}</span></div>` : ''}
      ${course.price !== undefined ? `<div class="back-detail-row"><span class="back-detail-icon">💰</span><span>${course.isFree || course.price===0 ? 'مجانية' : course.price?.toLocaleString() + ' د.ع'}</span></div>` : ''}
    </div>

    <div class="back-welcome">
      <strong>🎉 أهلاً وسهلاً بك!</strong>
      نسعد بمشاركتك في هذه الدورة ونتمنى لك تجربة تعليمية مثمرة ومميزة.
    </div>

    <div class="back-footer">
      <span class="back-website">🌐 ficc.iq</span>
      <span>اتحاد الغرف التجارية العراقية</span>
    </div>
  </div>`
}

function render() {
  const content = document.getElementById('content')
  if (!appsData.length) {
    content.innerHTML = '<div id="status" style="text-align:center;padding:60px;color:#666">لا يوجد مشاركون بعد</div>'
    return
  }

  let html = ''

  // صفحات الوجه (4 في كل صفحة)
  for (let i = 0; i < appsData.length; i += 4) {
    const group = appsData.slice(i, i + 4)
    html += `<div class="a4-page">`
    group.forEach(app => html += makeFront(app, courseData))
    // تعبئة بطاقات فارغة إذا أقل من 4
    for (let j = group.length; j < 4; j++) html += `<div class="card"></div>`
    html += `</div>`
  }

  // صفحات الخلف (إذا showBoth)
  if (showBoth) {
    for (let i = 0; i < appsData.length; i += 4) {
      const group = appsData.slice(i, i + 4)
      html += `<div class="a4-page">`
      // الخلف معكوس أفقياً للتوافق عند الطباعة على الوجهين
      // الترتيب: [1][0][3][2] بدل [0][1][2][3]
      const backOrder = [1, 0, 3, 2]
      backOrder.forEach(idx => {
        if (idx < group.length) html += makeBack(courseData)
        else html += `<div class="card"></div>`
      })
      html += `</div>`
    }
  }

  content.innerHTML = html
}

async function load() {
  try {
    const [cr, ar] = await Promise.all([
      fetch(`${API}/courses/${courseId}`),
      fetch(`${API}/courses/${courseId}/badges-data?key=ficc2026badges`)
    ])
    courseData = await cr.json()
    appsData   = await ar.json()

    if (!Array.isArray(appsData)) appsData = []

    document.getElementById('title').textContent  = '🪪 ' + (courseData?.title || 'Badges')
    document.getElementById('count').textContent   = appsData.length + ' مشارك'
    document.getElementById('status').style.display = 'none'

    render()
  } catch(e) {
    document.getElementById('status').textContent = '❌ خطأ: ' + e.message
  }
}

load()
</script>
</body>
</html>
