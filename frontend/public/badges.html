<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>Badges — FICC</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Cairo', sans-serif; background: #d1d5db; }

.toolbar {
  background: #111827;
  padding: 10px 20px;
  display: flex;
  gap: 10px;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
}
.toolbar h1 { color: #FFC72C; font-size: 14px; font-weight: 800; }
.info { color: rgba(255,255,255,0.5); font-size: 11px; }
.btn { padding: 7px 16px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Cairo',sans-serif; font-weight: 800; font-size: 12px; }
.btn-print { background: #FFC72C; color: #111; margin-right: auto; }
.btn-close  { background: rgba(255,255,255,0.1); color: #fff; }
.btn-mode   { background: rgba(255,255,255,0.1); color: #fff; }
.btn-mode.active { background: #3b82f6; color: #fff; }

/* A4 صفحة */
.a4-page {
  width: 210mm;
  height: 297mm;
  background: #fff;
  margin: 0 auto 20px;
  display: block;
  page-break-before: always;
  page-break-after: always;
  break-before: page;
  break-after: page;
  position: relative;
  overflow: hidden;
}

/* خط الطي */
.fold-line {
  width: 210mm;
  height: 1px;
  border-top: 1.5px dashed #bbb;
  position: absolute;
  top: 148.5mm;
  left: 0;
  z-index: 20;
}

/* الوجه — النصف العلوي */
.badge {
  width: 210mm;
  height: 148.5mm;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: absolute;
  top: 0; left: 0;
}

/* الخلف — النصف السفلي مقلوب */
.badge-back-half {
  width: 210mm;
  height: 148.5mm;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: absolute;
  bottom: 0; left: 0;
  transform: rotate(180deg);
}

/* ===== الوجه ===== */
.badge-front {
  background: #fff;
}

/* شريط اللون العلوي */
.badge-top-bar {
  background: linear-gradient(135deg, #1a2a5e 0%, #2C3E6B 100%);
  height: 22mm;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10mm;
  flex-shrink: 0;
}
.badge-top-bar .logo-wrap {
  display: flex;
  align-items: center;
  gap: 3mm;
}
.badge-top-bar img {
  height: 14mm;
  border-radius: 3mm;
  background: rgba(255,255,255,0.9);
  padding: 1.5mm;
  object-fit: contain;
}
.badge-top-bar .org-name {
  color: #FFC72C;
  font-size: 10pt;
  font-weight: 900;
  line-height: 1.4;
}
.badge-top-bar .org-name-en {
  color: rgba(255,255,255,0.6);
  font-size: 6.5pt;
  font-weight: 400;
}
.badge-top-bar .event-label {
  color: #fff;
  font-size: 7.5pt;
  font-weight: 900;
  text-align: left;
  direction: ltr;
  white-space: nowrap;
  border: 1.5px solid rgba(255,199,44,0.6);
  padding: 1.5mm 4mm;
  border-radius: 6mm;
  background: rgba(255,199,44,0.15);
}

/* منطقة الصورة */
.badge-photo-section {
  background: linear-gradient(180deg, #1a2a5e 0%, #f8fafc 40%);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 5mm 0 4mm;
  flex-shrink: 0;
}
.badge-photo-circle {
  width: 38mm;
  height: 38mm;
  border-radius: 50%;
  overflow: hidden;
  border: 4px solid #FFC72C;
  box-shadow: 0 4px 20px rgba(255,199,44,0.4);
  background: #e5e7eb;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30pt;
}
.badge-photo-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* معلومات العضو */
.badge-info-section {
  background: #fff;
  padding: 4mm 10mm;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3mm;
}
.badge-attendee-type {
  background: linear-gradient(135deg, #FFC72C, #f59e0b);
  color: #1a2a5e;
  font-size: 7.5pt;
  font-weight: 900;
  padding: 2mm 9mm;
  border-radius: 20mm;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-family: 'Inter', sans-serif;
  box-shadow: 0 2px 8px rgba(245,158,11,0.4);
}
.badge-name {
  font-size: 20pt;
  font-weight: 900;
  color: #111827;
  text-align: center;
  line-height: 1.2;
}
.badge-org-label {
  font-size: 8.5pt;
  color: #6b7280;
  text-align: center;
  font-weight: 600;
  direction: rtl;
}

/* الكود */
.badge-code-wrap {
  display: flex;
  align-items: center;
  gap: 2.5mm;
  background: linear-gradient(135deg, #eef2ff, #dbeafe);
  border: 2px solid #1a2a5e;
  border-radius: 10mm;
  padding: 2.5mm 8mm;
}
.badge-code-icon { font-size: 11pt; }
.badge-code-text {
  font-family: 'Inter', 'Courier New', monospace;
  font-size: 13pt;
  font-weight: 900;
  color: #1a2a5e;
  letter-spacing: 2px;
  direction: ltr;
}

/* QR */
.badge-qr-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2mm;
  padding: 2mm 0;
}
.badge-qr-section img {
  width: 28mm;
  height: 28mm;
  border-radius: 3mm;
  border: 1.5px solid #e5e7eb;
  padding: 1.5mm;
  background: #fff;
}
.badge-qr-label {
  font-size: 6.5pt;
  color: #9ca3af;
}

/* الشريط السفلي */
.badge-bottom-bar {
  background: linear-gradient(135deg, #1a2a5e, #2C3E6B);
  height: 11mm;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10mm;
  flex-shrink: 0;
}
.badge-bottom-bar span {
  color: rgba(255,255,255,0.5);
  font-size: 7pt;
}
.badge-bottom-bar .site {
  color: #FFC72C;
  font-weight: 700;
  font-size: 8.5pt;
}

/* ===== الخلف ===== */
.badge-back {
  background: #fff;
}

.back-color-bar {
  background: linear-gradient(135deg, #1a2a5e, #2C3E6B);
  height: 10mm;
  width: 100%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.back-color-bar img {
  height: 7mm;
  border-radius: 2mm;
  background: rgba(255,255,255,0.9);
  padding: 1mm;
  object-fit: contain;
}

.back-content {
  flex: 1;
  padding: 8mm 12mm;
  display: flex;
  flex-direction: column;
  gap: 5mm;
  overflow: hidden;
}

.back-event-header {
  text-align: center;
  border-bottom: 2px solid #e5e7eb;
  padding-bottom: 5mm;
}
.back-event-header .event-title {
  font-size: 16pt;
  font-weight: 900;
  color: #111827;
  line-height: 1.3;
}
.back-event-header .event-type {
  display: inline-block;
  margin-top: 2mm;
  background: #1e40af;
  color: #fff;
  font-size: 7.5pt;
  font-weight: 900;
  padding: 1.5mm 6mm;
  border-radius: 10mm;
  letter-spacing: 1px;
}

.back-details-list {
  display: flex;
  flex-direction: column;
  gap: 3.5mm;
}
.back-detail-item {
  display: flex;
  align-items: flex-start;
  gap: 3mm;
  font-size: 10.5pt;
  color: #374151;
  line-height: 1.5;
}
.detail-icon {
  width: 6mm;
  text-align: center;
  flex-shrink: 0;
  font-size: 11pt;
}

.back-welcome-box {
  background: linear-gradient(135deg, #eff6ff, #dbeafe);
  border-right: 4px solid #1e40af;
  border-radius: 4mm;
  padding: 5mm 6mm;
  flex: 1;
}
.back-welcome-box .welcome-title {
  font-size: 11pt;
  font-weight: 800;
  color: #1e40af;
  margin-bottom: 3mm;
}
.back-welcome-box .welcome-text {
  font-size: 9.5pt;
  color: #374151;
  line-height: 1.7;
}

.back-logos {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid #e5e7eb;
  padding-top: 3mm;
}
.back-logos img {
  height: 8mm;
  border-radius: 1.5mm;
  background: #f3f4f6;
  padding: 1mm;
  object-fit: contain;
}
.back-logos .site-url {
  font-size: 7pt;
  color: #1e40af;
  font-weight: 700;
  direction: ltr;
}

.back-bottom-bar {
  background: #fff;
  border-top: 1px solid #e5e7eb;
  height: 6mm;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4mm;
  flex-shrink: 0;
}
.back-bottom-bar span {
  color: #9ca3af;
  font-size: 5pt;
}
.back-bottom-bar .highlight { color: #1e40af; font-weight: 700; }

#status { text-align:center; padding:60px; font-size:16px; color:#666; }

@media print {
  .toolbar { display: none !important; }
  body { background: white; margin: 0; padding: 0; }
  .a4-page {
    margin: 0 !important;
    width: 210mm !important;
    height: 297mm !important;
    page-break-before: always !important;
    page-break-after: always !important;
    break-before: page !important;
    break-after: page !important;
  }
  .badge { width: 210mm !important; height: 297mm !important; }
}
@page { size: A4 portrait; margin: 0; }
</style>
</head>
<body>

<div class="toolbar">
  <h1 id="title">🪪 Badges — FICC</h1>
  <span class="info" id="count"></span>
  <button class="btn btn-mode active" id="modeBtn" onclick="toggleMode()">🔄 وجه + خلف</button>
  <button class="btn btn-print" onclick="window.print()">🖨️ طباعة / PDF</button>
  <button class="btn btn-close" onclick="window.close()">✕</button>
</div>

<div id="status">⏳ جارٍ التحميل...</div>
<div id="content"></div>

<script>
const params   = new URLSearchParams(window.location.search)
const courseId = params.get('course') || ''
const API      = '/api'
let showBack   = true
let course     = null
let apps       = []

function toggleMode() {
  showBack = !showBack
  document.getElementById('modeBtn').textContent  = showBack ? '🔄 وجه + خلف' : '📋 وجه فقط'
  document.getElementById('modeBtn').classList.toggle('active', showBack)
  render()
}

function fmt(d, short) {
  if (!d) return ''
  try {
    const opts = short
      ? {day:'2-digit', month:'2-digit', year:'numeric', timeZone:'Asia/Baghdad'}
      : {year:'numeric', month:'long', day:'numeric', timeZone:'Asia/Baghdad'}
    return new Date(d).toLocaleDateString('ar-IQ', opts)
  } catch { return d }
}

function qr(url) {
  return 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&margin=4&color=1e40af&data=' + encodeURIComponent(url)
}

function makeFront(app) {
  const sub   = app.subscriber || {}
  const name  = sub.fullName  || app.fullName  || app.FullName  || '—'
  const code  = sub.subscriberCode || sub.SubscriberCode || ''
  const photo = sub.profileImage   || sub.ProfileImage  || ''
  const url   = 'https://ficc.iq/startups/' + courseId

  return `
  <div class="badge badge-front">
    <div class="badge-top-bar">
      <div class="logo-wrap">
        <img src="https://ficc.iq/ficc-logo.jpg" onerror="this.style.display='none'">
        <div>
          <div class="org-name">اتحاد الغرف التجارية العراقية</div>
          <div class="org-name-en">Federation of Iraqi Chambers of Commerce</div>
        </div>
      </div>
      <div class="event-label">ATTENDEE</div>
    </div>

    <div class="badge-photo-section">
      <div class="badge-photo-circle">
        ${photo ? `<img src="${photo}" onerror="this.parentElement.textContent='👤'">` : '👤'}
      </div>
    </div>

    <div class="badge-info-section">
      <div class="badge-attendee-type">PARTICIPANT</div>
      <div class="badge-name">${name}</div>
      <div class="badge-org-label">اتحاد الغرف التجارية العراقية</div>
      ${code ? `
      <div class="badge-code-wrap">
        <span class="badge-code-icon">🪪</span>
        <span class="badge-code-text">${code}</span>
      </div>` : ''}
      <div class="badge-qr-section">
        <img src="${qr(url)}" alt="QR">
        <div class="badge-qr-label">امسح لعرض الدورة</div>
      </div>
    </div>

    <div class="badge-bottom-bar">
      <span class="site">ficc.iq</span>
      <span>${new Date().getFullYear()}</span>
    </div>
  </div>`
}

function makeBack() {
  const dates = course.startDate
    ? (course.endDate
      ? `${fmt(course.startDate)} — ${fmt(course.endDate)}`
      : fmt(course.startDate))
    : ''

  return `
  <div class="badge badge-back">
    <div class="back-color-bar"></div>
    <div class="back-content">
      <div class="back-event-header">
        <div class="event-title">🎓 ${course.title || ''}</div>
        <span class="event-type">TRAINING COURSE</span>
      </div>

      <div class="back-details-list">
        ${dates ? `<div class="back-detail-item"><span class="detail-icon">📅</span><span>${dates}</span></div>` : ''}
        ${course.location ? `<div class="back-detail-item"><span class="detail-icon">📍</span><span>${course.location}</span></div>` : ''}
        ${course.speaker  ? `<div class="back-detail-item"><span class="detail-icon">👤</span><span>${course.speaker}${course.speakerTitle ? ' — ' + course.speakerTitle : ''}</span></div>` : ''}
        ${(course.price !== undefined) ? `<div class="back-detail-item"><span class="detail-icon">💰</span><span>${course.isFree || course.price===0 ? 'مجانية' : course.price?.toLocaleString() + ' د.ع'}</span></div>` : ''}
      </div>

      <div class="back-welcome-box">
        <div class="welcome-title">🎉 أهلاً وسهلاً بك!</div>
        <div class="welcome-text">
          يسعدنا مشاركتك في هذه الدورة التدريبية المميزة.<br>
          نتمنى لك تجربة تعليمية ثرية ومثمرة تُضيف لمسيرتك المهنية.
        </div>
      </div>

      <div class="back-logos">
        <img src="https://ficc.iq/ficc-logo.jpg" onerror="this.style.display='none'">
        <span class="site-url">www.ficc.iq</span>
      </div>
    </div>
    <div class="back-bottom-bar">
      <span>Federation of Iraqi Chambers of Commerce</span>
      <span class="highlight">FICC</span>
      <span>${new Date().getFullYear()}</span>
    </div>
  </div>`
}

function render() {
  const el = document.getElementById('content')
  if (!apps.length) {
    el.innerHTML = '<div style="text-align:center;padding:60px;color:#666">لا يوجد مشاركون بعد</div>'
    return
  }

  let html = ''

  apps.forEach(app => {
    if (showBack) {
      // ورقة واحدة — وجه في النصف العلوي، خلف مقلوب في النصف السفلي
      // عند الطي من المنتصف → الوجهين متقابلان
      html += `
      <div class="a4-page">
        <div class="fold-line"></div>
        ${makeFront(app)}
        <div class="badge-back-half">${makeBack()}</div>
      </div>`
    } else {
      html += `<div class="a4-page">${makeFront(app)}</div>`
    }
  })

  el.innerHTML = html
}

async function load() {
  try {
    const [cr, ar] = await Promise.all([
      fetch(`${API}/courses/${courseId}`),
      fetch(`${API}/courses/${courseId}/badges-data?key=ficc2026badges`)
    ])
    course = await cr.json()
    const raw = await ar.json()
    apps = Array.isArray(raw) ? raw : []

    document.getElementById('title').textContent = '🪪 ' + (course?.title || 'Badges')
    document.getElementById('count').textContent = apps.length + ' مشارك'
    document.getElementById('status').style.display = 'none'
    render()
  } catch(e) {
    document.getElementById('status').textContent = '❌ خطأ: ' + e.message
  }
}

load()
</script>
</body>
</html>
